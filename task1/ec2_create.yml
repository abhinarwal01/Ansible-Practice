---
- hosts: localhost
  connection: local

  tasks:
  - name: Create EC2 instances
    amazon.aws.ec2_instance:
      name: "{{ item.name }}"
      key_name: "Default"
      instance_type: t3.micro
      security_group: launch-wizard-1
      region: us-east-1
      aws_access_key: "{{ec2_access_key}}"  # From vault as defined
      aws_secret_key: "{{ec2_secret_key}}"  # From vault as defined      
      network:
        assign_public_ip: true
      image_id: "{{ item.image }}"
      tags:
        environment: "{{ item.name }}"
    loop:
      - { image: "ami-08f44e8eca9095668", name: "manage-node-1" } # Update AMI ID according 
      - { image: "ami-0b6d9d3d33ba97d99", name: "manage-node-2" } # to your account
      - { image: "ami-0b6d9d3d33ba97d99", name: "manage-node-3" }
